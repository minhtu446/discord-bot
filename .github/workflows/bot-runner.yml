name: Bot Runner
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'start or stop'
        required: true
        default: 'start'
        type: choice
        options:
          - start
          - stop
      secret:
        description: 'Access password'
        required: true
        type: string

jobs:
  run-bot:
    if: |
      (github.event_name == 'schedule') ||
      (github.event.inputs.action == 'start' && github.event.inputs.secret == vars.BOT_SECRET)
    runs-on: ubuntu-latest
    timeout-minutes: 370
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --omit=dev --prefer-offline --no-audit --no-fund

      - name: Setup config + .env
        run: |
          cat > config.json << 'HEREDOC'
          {
            "token": "",
            "ownerId": "${{ secrets.OWNER_ID }}",
            "clientId": "${{ secrets.CLIENT_ID }}",
            "guildId": "${{ secrets.GUILD_ID }}",
            "welcomeChannelId": "${{ secrets.WELCOME_CHANNEL_ID }}",
            "logChannelId": "${{ secrets.LOG_CHANNEL_ID }}",
            "ticketCategoryId": "${{ secrets.TICKET_CATEGORY_ID }}",
            "memberRoleId": "${{ secrets.MEMBER_ROLE_ID }}",
            "setupCategoryId": "${{ secrets.SETUP_CATEGORY_ID }}",
            "hfToken": "",
            "dmRelayChannelId": "${{ secrets.DM_RELAY_CHANNEL_ID }}"
          }
          HEREDOC
          cat > .env << 'ENVHEREDOC'
          DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
          HF_TOKEN=${{ secrets.HF_TOKEN }}
          OWNER_ID=${{ secrets.OWNER_ID }}
          CLIENT_ID=${{ secrets.CLIENT_ID }}
          GUILD_ID=${{ secrets.GUILD_ID }}
          WELCOME_CHANNEL_ID=${{ secrets.WELCOME_CHANNEL_ID }}
          LOG_CHANNEL_ID=${{ secrets.LOG_CHANNEL_ID }}
          TICKET_CATEGORY_ID=${{ secrets.TICKET_CATEGORY_ID }}
          MEMBER_ROLE_ID=${{ secrets.MEMBER_ROLE_ID }}
          SETUP_CATEGORY_ID=${{ secrets.SETUP_CATEGORY_ID }}
          DM_RELAY_CHANNEL_ID=${{ secrets.DM_RELAY_CHANNEL_ID }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          OCRSPACE_API_KEY=${{ secrets.OCRSPACE_API_KEY }}
          ENVHEREDOC

      - name: Run bot
        run: |
          echo "[Runner] Bot starting at $(date)..."

          # Configure git push with PAT
          git config user.name "Bot Sync"
          git config user.email "bot@sync"
          git remote set-url origin https://x-access-token:${{ vars.BOT_PAT }}@github.com/${{ github.repository }}.git
          echo "[Runner] Git remote configured with PAT"

          # Background data sync every 2 min
          (
            while true; do
              sleep 120
              cd "$GITHUB_WORKSPACE"
              git add data/ 2>/dev/null
              if ! git diff --cached --quiet 2>/dev/null; then
                git commit -m "auto: sync data $(date -u '+%H:%M:%S %d/%m/%Y')" 2>/dev/null || true
                git push origin main 2>&1 || true
                echo "[DataSync] Pushed data at $(date)"
              fi
            done
          ) &
          DATASYNC_PID=$!

          node index.js &
          BOT_PID=$!

          RUN_START=$(date +%s)
          MAX_SECONDS=20400

          while kill -0 $BOT_PID 2>/dev/null; do
            sleep 30
            NOW=$(date +%s)
            ELAPSED=$((NOW - RUN_START))
            REMAINING=$((MAX_SECONDS - ELAPSED))
            if [ $((ELAPSED % 300)) -eq 0 ] || [ $REMAINING -lt 600 ]; then
              echo "[Runner] Elapsed: ${ELAPSED}s | Remaining: ${REMAINING}s"
            fi
            if [ $REMAINING -lt 600 ]; then
              echo "[Runner] Less than 10 min left, triggering next run..."
              DISPATCH_OK=false
              for i in 1 2 3; do
                RESP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                  -H "Authorization: Bearer ${{ vars.BOT_PAT }}" \
                  -H "Accept: application/vnd.github.v3+json" \
                  "https://api.github.com/repos/${{ github.repository }}/actions/workflows/bot-runner.yml/dispatches" \
                  -d '{"ref":"main","inputs":{"action":"start","secret":"'"${{ vars.BOT_SECRET }}"'"}}')
                echo "[Runner] Dispatch attempt $i: HTTP $RESP"
                if [ "$RESP" = "204" ]; then
                  DISPATCH_OK=true
                  break
                fi
                sleep 5
              done
              if [ "$DISPATCH_OK" = true ]; then
                echo "[Runner] Next run triggered, exiting..."
                kill $BOT_PID 2>/dev/null
                kill $DATASYNC_PID 2>/dev/null
                break
              else
                echo "[Runner] Dispatch failed 3 times, bot continues..."
              fi
            fi
          done
          # Final data push before exit
          cd "$GITHUB_WORKSPACE"
          git add data/ 2>/dev/null
          if ! git diff --cached --quiet 2>/dev/null; then
            git commit -m "auto: final sync data $(date -u '+%H:%M:%S %d/%m/%Y')" 2>/dev/null || true
            git push origin main 2>&1 || true
            echo "[DataSync] Final push done at $(date)"
          fi
          kill $DATASYNC_PID 2>/dev/null
          echo "[Runner] Bot stopped at $(date)."

      - name: Cleanup
        if: always()
        run: echo "[Runner] Cleanup done."
